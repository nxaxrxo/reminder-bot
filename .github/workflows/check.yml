name: Check Reminders

on:
  schedule:
    # Every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch:
    # Manual trigger from GitHub UI

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to commit updated reminders.json
    steps:
      - uses: actions/checkout@v4

      - name: Check and send due reminders
        run: python .github/scripts/check_reminders.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commit changes
        run: |
          git config user.name "reminder-bot"
          git config user.email "bot@reminder-bot"
          git add reminders.json
          if ! git diff --cached --quiet; then
            git commit -m "remove sent reminders [skip ci]"
            git push
          fi
